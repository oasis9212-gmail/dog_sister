name: bowwow_flutter
description: "Bowwow Flutter app"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.4
  google_mlkit_text_recognition: ^0.15.1
  image_picker: ^1.2.1
  provider: ^6.1.5
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.3

flutter:
  uses-material-design: true

  assets:
    # 이 폴더 전체가 번들에 포함됩니다. `assets/lovable_reference/dog-bowwow.png` 포함.
    - assets/lovable_reference/
