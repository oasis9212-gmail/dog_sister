  <!-- ears -->
  <path d="M92 68 C80 48, 86 24, 110 30 C115 36, 116 54, 110 70 Z" fill="#E29E55"/>
  <path d="M168 68 C180 48, 174 24, 150 30 C145 36, 144 54, 150 70 Z" fill="#E29E55"/>

